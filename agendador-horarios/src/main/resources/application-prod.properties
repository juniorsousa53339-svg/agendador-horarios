# Perfil de produção para deploy simples com H2 em arquivo (persistente quando houver disco persistente no provedor)
spring.datasource.url=jdbc:h2:file:/data/agendador;MODE=PostgreSQL;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

# Ajuste CORS com o domínio do seu front publicado (separe múltiplos domínios por vírgula)
app.cors.allowed-origins=https://SEU_USUARIO.github.io,http://localhost:4200
